# Acuity NemoClaw policy
#
# Enforces the four-source allowlist required by the PRD §12 and CLAUDE.md:
#   1. api.fda.gov                   — OpenFDA Label + FAERS
#   2. rxnav.nlm.nih.gov             — RxNorm normalisation
#   3. pubchem.ncbi.nlm.nih.gov      — PubChem (SMILES, optional)
#   4. integrate.api.nvidia.com      — Nemotron inference (super-120b, nano-30b)
#
# Everything else is implicitly denied by NemoClaw's network_policies model.
# That includes a prompt-injection attempt to reach attacker.invalid (see
# `docs/demo-cases.md` for the attack-case definition).
#
# Filesystem is locked to read-only system paths plus a single writable
# session directory at /session, where the audit log also lives.
#
# Process: sandbox user, no privilege escalation, subprocess spawning is
# implicitly disallowed by OpenClaw's default sandbox runtime.

version: 1

filesystem_policy:
  include_workdir: true
  read_only:
    - /usr
    - /lib
    - /proc
    - /dev/urandom
    - /app
    - /etc
    - /var/log
  read_write:
    - /sandbox
    - /session
    - /tmp
    - /dev/null

landlock:
  compatibility: best_effort

process:
  run_as_user: sandbox
  run_as_group: sandbox

network_policies:

  # Drug-data sources — the only HTTP egress the source agents are allowed.
  openfda:
    name: openfda
    endpoints:
      - host: api.fda.gov
        port: 443
        protocol: rest
        enforcement: enforce
        access: full
    binaries:
      - { path: "/**" }

  rxnorm:
    name: rxnorm
    endpoints:
      - host: rxnav.nlm.nih.gov
        port: 443
        protocol: rest
        enforcement: enforce
        access: full
    binaries:
      - { path: "/**" }

  pubchem:
    name: pubchem
    endpoints:
      - host: pubchem.ncbi.nlm.nih.gov
        port: 443
        protocol: rest
        enforcement: enforce
        access: full
    binaries:
      - { path: "/**" }

  # Brave Search — used by the DeepResearch skill only.
  brave:
    name: brave
    endpoints:
      - host: api.search.brave.com
        port: 443
        protocol: rest
        enforcement: enforce
        access: full
    binaries:
      - { path: "/**" }

  # Telegram Bot API — used by the Reminder skill to send messages.
  telegram:
    name: telegram
    endpoints:
      - host: api.telegram.org
        port: 443
        protocol: rest
        enforcement: enforce
        access: full
    binaries:
      - { path: "/**" }

  # Acuity API — used by the Analyze and DB skills.
  # TODO: replace placeholder with production Vercel host from ACUITY_API_BASE_URL.
  acuity_api:
    name: acuity_api
    endpoints:
      - host: acuity.vercel.app  # TODO fill from ACUITY_API_BASE_URL
        port: 443
        protocol: rest
        enforcement: enforce
        access: full
    binaries:
      - { path: "/**" }

  # Supabase — backend DB queries only (service key, bypasses RLS).
  supabase:
    name: supabase
    endpoints:
      - host: blnxyzbmwuxboruticrg.supabase.co
        port: 443
        protocol: rest
        enforcement: enforce
        access: full
    binaries:
      - { path: "/**" }

  # Nemotron inference. Anchor for the entire synthesis pipeline.
  nvidia:
    name: nvidia
    endpoints:
      - host: integrate.api.nvidia.com
        port: 443
        protocol: rest
        enforcement: enforce
        access: full
      - host: inference-api.nvidia.com
        port: 443
        protocol: rest
        enforcement: enforce
        access: full
    binaries:
      - { path: "/**" }
